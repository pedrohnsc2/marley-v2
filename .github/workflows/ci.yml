# =============================================================================
# Marley CI — runs on every PR and push to main
#
# Three parallel jobs: Python tests, Next.js build, Docker image builds.
# Docker build only runs after tests + build pass.
#
# deploy.yml triggers on workflow_run from this workflow (name: "CI").
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python unit tests
  # ---------------------------------------------------------------------------
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Next.js type check + build
  # ---------------------------------------------------------------------------
  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  # ---------------------------------------------------------------------------
  # Docker image builds (verify they build, don't push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, web-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
